<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1080px; height: 1080px; }
body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #F4F7F8;
    color: #1F2D35;
}
.card {
    width: 1080px;
    height: 1080px;
    background: #F4F7F8;
    padding: 76px 84px;
    display: flex;
    flex-direction: column;
    position: relative;
}
.eyebrow {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
}
.footer {
    position: absolute;
    left: 84px;
    right: 84px;
    bottom: 56px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 18px;
    color: #61717A;
    font-weight: 600;
    border-top: 1px solid #D9E4E8;
    padding-top: 22px;
}
.icon-wrap {
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.icon-wrap svg { display: block; }


.icon-row-2 { display:flex; gap:20px; margin-bottom: 40px; }
.icon-wrap.c2 { width: 76px; height: 76px; }
.hero-2 { font-family:'Inter', sans-serif; font-weight:800; font-size:150px; color:#B7791F; line-height:1; letter-spacing:-0.02em; }
.hero-2-unit { font-size:38px; font-weight:700; color:#1F2D35; margin-left:8px; }
.sub-2 { font-size:26px; color:#61717A; font-weight:600; margin-top:6px; }
.title-2 { font-family:'Playfair Display', serif; font-weight:700; font-size:42px; line-height:1.25; margin-top:44px; max-width:860px; }
.compare-2 { margin-top: 46px; display:flex; flex-direction:column; gap:22px; }
.bar-row-2 { display:flex; align-items:center; gap:20px; }
.bar-label-2 { width: 140px; font-size:24px; font-weight:700; color:#61717A; }
.bar-track-2 { flex:1; height:34px; background:#D9E4E8; border-radius:17px; overflow:hidden; }
.bar-fill-2 { height:100%; border-radius:17px; }
.bar-value-2 { width: 110px; text-align:right; font-size:26px; font-weight:800; color:#1F2D35; }

</style>
</head>
<body>

<div class="card">
    <div class="eyebrow" style="color:#B7791F;">2 &middot; LOS EXTREMOS</div>
    <div class="icon-row-2">
        <div class="icon-wrap c2" style="background:#F8E4DD; color:#D86A4A;"><svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.3"></circle><line x1="12" y1="2" x2="12" y2="4.6"></line><line x1="12" y1="19.4" x2="12" y2="22"></line><line x1="2" y1="12" x2="4.6" y2="12"></line><line x1="19.4" y1="12" x2="22" y2="12"></line><line x1="4.9" y1="4.9" x2="6.7" y2="6.7"></line><line x1="17.3" y1="17.3" x2="19.1" y2="19.1"></line><line x1="4.9" y1="19.1" x2="6.7" y2="17.3"></line><line x1="17.3" y1="6.7" x2="19.1" y2="4.9"></line></svg></div>
        <div class="icon-wrap c2" style="background:#F4E7CF; color:#B7791F;"><svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2.5" x2="12" y2="9"></line><polyline points="8.7 5.3 12 2 15.3 5.3"></polyline><line x1="12" y1="21.5" x2="12" y2="15"></line><polyline points="8.7 18.7 12 22 15.3 18.7"></polyline></svg></div>
        <div class="icon-wrap c2" style="background:#E2EEF7; color:#2F6F9F;"><svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line><line x1="19.07" y1="4.93" x2="4.93" y2="19.07"></line></svg></div>
    </div>
    <div style="display:flex; align-items:baseline;">
        <div class="hero-2">+0,39</div>
        <div class="hero-2-unit">°C / d&eacute;cada</div>
    </div>
    <div class="sub-2">amplitud t&eacute;rmica anual &middot; d&iacute;a m&aacute;s caluroso &minus; d&iacute;a m&aacute;s fr&iacute;o</div>

    <div class="title-2">La distancia entre el d&iacute;a m&aacute;s caluroso y el m&aacute;s fr&iacute;o del a&ntilde;o ha ido creciendo.</div>

    <div class="compare-2">
        <div class="bar-row-2">
            <div class="bar-label-2">1940&ndash;1982</div>
            <div class="bar-track-2"><div class="bar-fill-2" style="width:82%; background:#B7791F;"></div></div>
            <div class="bar-value-2">25,2&nbsp;°C</div>
        </div>
        <div class="bar-row-2">
            <div class="bar-label-2">1983&ndash;2025</div>
            <div class="bar-track-2"><div class="bar-fill-2" style="width:100%; background:#B7791F;"></div></div>
            <div class="bar-value-2">26,9&nbsp;°C</div>
        </div>
    </div>
    <div class="footer">
        <span>PUERTO MONTT &middot; 1940&ndash;2025 &middot; ERA5 (Open-Meteo)</span>
        <span>2 / 6</span>
    </div>
</div>

</body>
</html>
